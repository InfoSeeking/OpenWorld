<svg xmlns="http://www.w3.org/2000/svg" width="960" height="160" viewBox="0 0 960 160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <!-- Grid lines suggesting a world/map grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.6"/>
    </pattern>
    <!-- Subtle radial glow at center-left -->
    <radialGradient id="glow" cx="30%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a6eb5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0f1e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="160" fill="url(#bg)"/>
  <rect width="960" height="160" fill="url(#grid)"/>
  <rect width="960" height="160" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="160" fill="#4a90d9"/>

  <!-- Globe wireframe icon (simplified meridian/parallel arcs) -->
  <g transform="translate(72, 80)" fill="none" stroke="#4a90d9" stroke-width="1.4" opacity="0.9">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="36"/>
    <!-- Vertical meridian -->
    <ellipse cx="0" cy="0" rx="14" ry="36"/>
    <!-- Horizontal parallels -->
    <ellipse cx="0" cy="-14" rx="32" ry="8"/>
    <ellipse cx="0" cy="14"  rx="32" ry="8"/>
    <!-- Equator -->
    <line x1="-36" y1="0" x2="36" y2="0"/>
  </g>

  <!-- Title -->
  <text x="130" y="74"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="42"
        font-weight="700"
        letter-spacing="-1"
        fill="#ffffff">OpenWorld</text>

  <!-- Subtitle -->
  <text x="132" y="104"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="15"
        font-weight="400"
        letter-spacing="0.3"
        fill="#7aafd4">Open infrastructure for world model research</text>

  <!-- Right-side tag: UW InfoSeeking Lab · RAISE Center -->
  <text x="940" y="88"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="12"
        font-weight="400"
        letter-spacing="0.2"
        fill="#4a7a9b"
        text-anchor="end">UW InfoSeeking Lab · RAISE Center</text>

  <!-- Bottom border line -->
  <line x1="0" y1="159" x2="960" y2="159" stroke="#1e3a5f" stroke-width="1"/>
</svg>
